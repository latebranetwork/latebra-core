<script>
/* Latebra Vault — canonical wallet app, shared 1:1 by the Chrome extension
   popup and the lat-wallet-web page (wallet.html embeds this exact file; run
   latebra-core/scripts/build-wallet-html.sh after editing it or popup.css).
   MV3 forbids inline handlers, so ALL clicks go through one delegated
   listener keyed on data-act/data-arg. Talks to the lat-wallet-web HTTP API,
   which signs natively and forwards to a latebrad node. */

const IS_EXT = typeof chrome !== 'undefined' && !!(chrome.runtime && chrome.runtime.id);

const $ = (id) => document.getElementById(id);
let API = IS_EXT ? (localStorage.getItem('lat_api') || 'http://127.0.0.1:8090') : '';
let NODE = localStorage.getItem('lat_node') || '127.0.0.1:4040';
let SEED = localStorage.getItem('lat_seed') || '';
let ADDR = localStorage.getItem('lat_addr') || '';
let LAST = { registered: false, spendable: '0.00000', pending: '0.00000', public: '0.00000', total: '0.00000', usdc: '0.00000' };
let MKT = { lat: 0, chg: 0, usdc: 1, usdc_live: false };
let VIEW = 'home';
let poll = null;

/* Network: 'testnet' until launch; at mainnet flip lat_net (or the default).
   On mainnet the USDC token is real bridged USD Coin; on testnet it is the
   faucet-minted test asset, labelled so nobody mistakes it for real money. */
const NET = localStorage.getItem('lat_net') || 'testnet';
const IS_MAINNET = NET === 'mainnet';
const USDC_NAME = IS_MAINNET ? 'USD Coin' : 'USDC (Testnet)';

/* Where Discover points. Repoint to production domains at launch. */

/* ---- utils ---- */
function toast(m, e) { const t = $('toast'); t.textContent = m; t.className = 'toast show' + (e ? ' err' : ''); clearTimeout(t._t); t._t = setTimeout(() => t.className = 'toast', 2600); }
async function api(path, params) {
  params.node = NODE;
  const q = Object.entries(params).map(([k, v]) => k + '=' + encodeURIComponent(v)).join('&');
  try {
    const r = await fetch(API + '/api/' + path + '?' + q);
    return await r.json();
  } catch {
    return { error: 'cannot reach the wallet server' + (IS_EXT ? ' at ' + API : '') + ' — start lat-wallet-web' };
  }
}
function save() { localStorage.setItem('lat_seed', SEED); localStorage.setItem('lat_addr', ADDR); }
function copyText(t, m) { navigator.clipboard.writeText(t); toast(m || 'copied'); }
function shortAddr(a) { return a ? a.slice(0, 8) + '…' + a.slice(-6) : ''; }
const nf = (n, d) => (n || 0).toLocaleString(undefined, { minimumFractionDigits: d ?? 2, maximumFractionDigits: d ?? 2 });
const usd = (n) => '$' + nf(n);
const num = (s) => parseFloat(s || '0') || 0;
function timeAgo(ts) {
  const d = Math.max(0, Date.now() / 1000 - ts);
  if (d < 60) return 'just now';
  if (d < 3600) return Math.floor(d / 60) + 'm ago';
  if (d < 86400) return Math.floor(d / 3600) + 'h ago';
  return Math.floor(d / 86400) + 'd ago';
}
function chgChip(chg) {
  const up = chg >= 0;
  return `<span class="pc ${up ? 'up' : 'dn'}">${up ? '+' : ''}${nf(chg)}%</span>`;
}

async function refresh() {
  if (!SEED) return;
  const [r, m] = await Promise.all([
    api('balance', { seed: SEED, net: NET }),
    api('market', {}),
  ]);
  if (m && m.ok) MKT = m;
  if (r.error) { toast(r.error, true); return; }
  if (r.address) { ADDR = r.address; save(); }
  LAST = r;
  paintHome();
  paintSwap();
}

function paintHome() {
  if (VIEW !== 'home' || !$('heroUsd')) return;
  const r = LAST, price = MKT.lat || 0;
  const reg = $('regbar'), pend = $('pendbar');
  if (r.registered === false) {
    setHeroUsd(0);
    $('heroLat').textContent = '0.00000 LAT';
    if (reg) reg.innerHTML = `
      <div class="banner">
        <div class="bi">${I.spark}</div>
        <div class="bt"><div class="t">Activate your account</div><div class="d">A one-time on-chain registration.</div></div>
        <button class="primary" data-act="register">Activate</button>
      </div>`;
    if (pend) pend.innerHTML = '';
    return;
  }
  if (reg) reg.innerHTML = '';
  const latTotal = num(r.total), usdcAmt = num(r.usdc);
  setHeroUsd(latTotal * price + usdcAmt * (MKT.usdc || 1));
  $('heroLat').textContent = nf(latTotal, 5) + ' LAT';
  const chg = $('chg');
  if (chg) {
    const up = (MKT.chg || 0) >= 0;
    chg.className = 'chg ' + (up ? '' : 'dn');
    chg.innerHTML = `${up ? '▲' : '▼'} ${up ? '+' : ''}${nf(MKT.chg)}% · LAT ${usd(price)}`;
  }
  const priceLine = `${usd(price)} · ` + chgChip(MKT.chg);
  if ($('pxLat1')) $('pxLat1').innerHTML = priceLine;
  if ($('pxLat2')) $('pxLat2').innerHTML = priceLine;
  if ($('spend')) $('spend').textContent = nf(num(r.spendable), 5) + ' LAT';
  if ($('pub')) $('pub').textContent = nf(num(r.public), 5) + ' LAT';
  if ($('usdcAmt')) $('usdcAmt').textContent = nf(usdcAmt, 5) + ' USDC';
  if ($('spendUsd')) $('spendUsd').textContent = usd(num(r.spendable) * price);
  if ($('pubUsd')) $('pubUsd').textContent = usd(num(r.public) * price);
  if ($('usdcUsd')) $('usdcUsd').textContent = usd(usdcAmt * (MKT.usdc || 1));
  const p = num(r.pending);
  if (pend) pend.innerHTML = p > 0 ? `
    <div class="banner">
      <div class="bi">${I.roll}</div>
      <div class="bt"><div class="t">${r.pending} LAT pending</div><div class="d">Received funds — roll over to make them spendable.</div></div>
      <button class="primary" data-act="rollover">Roll over</button>
    </div>` : '';
}

/* Count the hero USD value up/down to its new value instead of snapping. */
let HERO_VAL = 0;
function setHeroUsd(to) {
  const el = $('heroUsd'); if (!el) return;
  const from = HERO_VAL; HERO_VAL = to;
  if (from === to || matchMedia('(prefers-reduced-motion:reduce)').matches) { el.textContent = usd(to); return; }
  const t0 = performance.now(), dur = 650;
  (function step(now) {
    const p = Math.min(1, (now - t0) / dur), e = 1 - Math.pow(1 - p, 3);
    el.textContent = usd(from + (to - from) * e);
    if (p < 1) requestAnimationFrame(step);
  })(t0);
}

function actIcon(t) {
  if (t.dir === 'in') return { ic: I.dnl, cls: 'in' };
  if (t.label.startsWith('Private')) return { ic: I.eyeoff, cls: 'prv' };
  if (t.label.includes('Shield') || t.label === 'Shielded') return { ic: I.lock, cls: 'prv' };
  if (t.label.includes('Unshield')) return { ic: I.unlock, cls: '' };
  if (t.dir === 'self') return { ic: I.roll, cls: '' };
  return { ic: I.upr, cls: '' };
}
async function loadActivity() {
  const r = await api('activity', { seed: SEED, net: NET });
  const el = $('actlist'); if (!el) return;
  if (!r.ok) { el.innerHTML = `<div class="empty">${r.error || 'failed to load'}</div>`; return; }
  if (!r.txs.length) { el.innerHTML = '<div class="empty">No activity yet — grab some LAT from the faucet.</div>'; return; }
  el.innerHTML = `<div class="list">` + r.txs.map((t) => {
    const { ic, cls } = actIcon(t);
    const sub = timeAgo(t.ts) + (t.other ? ' · ' + shortAddr(t.other) : ` · block ${t.h}`);
    let right;
    if (t.amount === null) right = `<span class="tag priv">HIDDEN</span>`;
    else {
      const sign = t.dir === 'in' ? '+' : t.dir === 'out' ? '−' : '';
      right = `<div class="b mono ${t.dir === 'in' ? 'up' : ''}">${sign}${nf(num(t.amount), 5)}</div><div class="f">${t.token}</div>`;
    }
    return `<div class="tok" style="cursor:default">
      <div class="aic ${cls}">${ic}</div>
      <div class="meta"><div class="n">${t.label}</div><div class="s">${sub}</div></div>
      <div class="val">${right}</div>
    </div>`;
  }).join('') + `</div>`;
}

        <div class="pillnode" style="margin-bottom:14px"><input id="apiurl" value="${API}"><button class="primary" data-act="saveApi">Save</button></div>` : ''}
      </div>

      <div class="section-t">Security</div>
      <div class="setcard">
        <div class="set-row" data-act="revealSeed">
          <div class="si">${I.key}</div><div class="st"><div class="t">Reveal secret seed</div><div class="d">Show your recovery phrase</div></div><div class="chev">${I.chevr}</div>
        </div>
        <div class="set-row" data-act="logout">
          <div class="si">${I.out}</div><div class="st"><div class="t" style="color:var(--red)">Log out</div><div class="d">Remove this wallet from the browser</div></div><div class="chev">${I.chevr}</div>
        </div>
      </div>
      <p class="verline mono">LATEBRA VAULT · TESTNET · v0.2</p>
    </div>
    ${navBar()}`;
}
function saveNode() { NODE = $('node').value.trim(); localStorage.setItem('lat_node', NODE); toast('node saved'); refresh(); }
function saveApi() { API = $('apiurl').value.trim().replace(/\/+$/, ''); localStorage.setItem('lat_api', API); toast('wallet server saved'); refresh(); }

/* ================= chain actions ================= */
async function register() { const r = await api('register', { seed: SEED, net: NET }); toast(r.ok ? r.msg : (r.error || 'failed'), !r.ok); }
async function rollover() {
  if (num(LAST.pending) <= 0) { toast('nothing pending to roll over'); return; }
  const r = await api('rollover', { seed: SEED, net: NET }); toast(r.ok ? r.msg : (r.error || 'failed'), !r.ok);
}
async function send() {
  const to = $('to').value.trim(), amt = $('amt').value.trim();
  if (!to || !amt) { toast('enter recipient and amount', true); return; }
  toast('building transaction…');
  const r = await api(SENDMODE === 'private' ? 'send' : 'public-send', { seed: SEED, to: to, amount: amt, net: NET });
  if (r.ok) { toast(r.msg); closeSheet(); setTimeout(refresh, 1000); }
  else toast(r.error || 'failed', true);
}
async function doMove() {
  const amt = $('mvamt').value.trim();
  if (!amt) { toast('enter an amount', true); return; }
  toast(MOVEDIR === 'shield' ? 'shielding…' : 'building the privacy proof…');
  const r = await api(MOVEDIR, { seed: SEED, amount: amt, net: NET });
  if (r.ok) { toast(r.msg); closeSheet(); setTimeout(refresh, 1000); }
  else toast(r.error || 'failed', true);
}
async function faucet() {
  if (LAST.registered === false) { toast('activate your account first', true); return; }
  toast('requesting from the faucet…');
  const r = await api('faucet', { to: ADDR, net: NET });
  toast(r.ok ? r.msg : (r.error || 'failed'), !r.ok);
  if (r.ok) setTimeout(refresh, 4000);
}

/* ================= sheets ================= */
function openSheet(html) { $('sheet').innerHTML = '<div class="grip"></div>' + html; $('sheet').classList.add('show'); $('backdrop').classList.add('show'); }
function closeSheet() { $('sheet').classList.remove('show'); $('backdrop').classList.remove('show'); }

function openReceive() {
  openSheet(`
    <h3>Receive</h3>
    <p class="sub">Share your address to receive LAT or USDC. Private funds arrive as pending.</p>
    <div class="qr">${qrSvg(ADDR)}</div>
    <div class="addrbox">${ADDR}</div>
    <div class="row">
      <button class="ghost" data-act="closeSheet">Close</button>
      <button class="primary" data-act="copyAddr">Copy address</button>
    </div>`);
}
let SENDMODE = 'private';
function openSend(mode) {
  openSheet(`
    <h3>Send LAT</h3>
    <p class="sub">Choose which balance to pay from · a small network fee applies.</p>
    <div class="seg">
      <button id="segP" data-act="setSendMode" data-arg="private">🔒 Private</button>
      <button id="segU" data-act="setSendMode" data-arg="public">👁 Public</button>
    </div>
    <div class="hint" id="sendhint"></div>
    <label>Recipient address</label>
    <input id="to" placeholder="latt1…" autocomplete="off" spellcheck="false">
    <label>Amount (LAT)</label>
    <input id="amt" placeholder="0.0" inputmode="decimal">
    <div class="row">
      <button class="ghost" data-act="closeSheet">Cancel</button>
      <button class="primary" data-act="send">Send</button>
    </div>`);
  setSendMode(mode || 'private');
}
function setSendMode(m) {
  SENDMODE = m;
  $('segP').className = m === 'private' ? 'on' : '';
  $('segU').className = m === 'public' ? 'on' : '';
  $('sendhint').innerHTML = m === 'private'
    ? `Pays from your <b>private balance (${LAST.spendable || '0.00000'} LAT)</b>. On the explorer this shows only "proof verified" — <b>no sender, receiver or amount</b>. The recipient rolls it over to spend.`
    : `Pays from your <b>public balance (${LAST.public || '0.00000'} LAT)</b>. Sender, receiver and amount are <b>fully visible</b> on the explorer — like Ethereum.`;
}

let MOVEDIR = 'shield';
function openMove(dir) {
  openSheet(`
    <h3>Shield / Unshield</h3>
    <p class="sub">Move LAT between your own public and private balances.</p>
    <div class="seg">
      <button id="segS" data-act="setMoveDir" data-arg="shield">Public → Private</button>
      <button id="segX" data-act="setMoveDir" data-arg="unshield">Private → Public</button>
    </div>
    <div class="hint" id="movehint"></div>
    <label>Amount (LAT)</label>
    <input id="mvamt" placeholder="0.0" inputmode="decimal">
    <div class="row">
      <button class="ghost" data-act="closeSheet">Cancel</button>
      <button class="primary" id="mvbtn" data-act="doMove">Shield</button>
    </div>`);
  setMoveDir(dir || 'shield');
}
function setMoveDir(d) {
  MOVEDIR = d;
  $('segS').className = d === 'shield' ? 'on' : '';
  $('segX').className = d === 'unshield' ? 'on' : '';
  $('mvbtn').textContent = d === 'shield' ? 'Shield' : 'Unshield';
  $('movehint').innerHTML = d === 'shield'
    ? `Makes coins <b>private</b>. Public balance: <b>${LAST.public || '0.00000'} LAT</b>. The amount crossing the boundary is visible once; after that, private transfers hide everything. Shielded funds arrive as <b>pending</b> — roll over to spend them.`
    : `Makes coins <b>public</b> again. Private balance: <b>${LAST.spendable || '0.00000'} LAT</b>. A zero-knowledge proof spends them; the amount appears in your public balance.`;
}

/* confirm()/alert() are unreliable in extension popups — use sheets instead. */
function revealSeed() {
  openSheet(`
    <h3>Your secret seed</h3>
    <p class="sub">Keep it secret. Anyone with it controls this wallet.</p>
    <div class="warn">${I.warn}<div>Never share this seed or type it into a website.</div></div>
    <div class="seedbox" style="margin-bottom:14px">${SEED}</div>
    <div class="row">
      <button class="ghost" data-act="closeSheet">Close</button>
      <button class="primary" data-act="copySeed">Copy seed</button>
    </div>`);
}
function logout() {
  openSheet(`
    <h3>Log out?</h3>
    <p class="sub">Make sure your seed is saved — it will be removed from this browser.</p>
    <div class="warn">${I.warn}<div>Without your seed you cannot recover this wallet.</div></div>
    <div class="row">
      <button class="ghost" data-act="closeSheet">Cancel</button>
      <button class="danger" data-act="doLogout">Log out</button>
    </div>`);
}
function doLogout() {
  localStorage.removeItem('lat_seed'); localStorage.removeItem('lat_addr');
  SEED = ''; ADDR = ''; closeSheet(); showWelcome();
}

/* A lightweight deterministic address glyph (NOT a scannable QR — a visual
   fingerprint so a receive address is recognizable at a glance). */
function qrSvg(addr) {
  let h = 2166136261; for (let i = 0; i < (addr || '').length; i++) { h ^= addr.charCodeAt(i); h = Math.imul(h, 16777619); }
  const n = 9, cell = 15, pad = 6; let rects = '';
  for (let y = 0; y < n; y++) for (let x = 0; x < Math.ceil(n / 2); x++) {
    h ^= h << 13; h ^= h >>> 17; h ^= h << 5;
    if ((h & 7) > 3) {
      const rx = pad + x * cell, ry = pad + y * cell;
      rects += `<rect x="${rx}" y="${ry}" width="${cell}" height="${cell}" rx="3"/>`;
      if (x < Math.floor(n / 2)) rects += `<rect x="${pad + (n - 1 - x) * cell}" y="${ry}" width="${cell}" height="${cell}" rx="3"/>`;
    }
  }
  return `<svg viewBox="0 0 ${n * cell + pad * 2} ${n * cell + pad * 2}" width="146" height="146" fill="#141c31">${rects}</svg>`;
}

/* ================= delegated events (MV3: no inline handlers) ================= */
const ACTIONS = {
  showWelcome, showImport, doImport, createWallet,
  goHome: () => showView('home'),
  showView: (arg) => showView(arg),
  openReceive, openSend, openMove: (arg) => openMove(arg),
  setSendMode: (arg) => setSendMode(arg), setMoveDir: (arg) => setMoveDir(arg),
  send, doMove, faucet, register, rollover, closeSheet,
  swapFlip, swapMax, doSwap,
  setSwapMode: (arg) => setSwapMode(arg),
  poolFlip, doPoolSwap, doPoolAdd, doPoolRemove,
  doBridgeLock, doBridgeClaim, doBridgeRefund, copyPreimage,
  setXchain: (arg) => setXchain(arg), doXchainQuote,
  fillClaim: (arg) => fillClaim(arg),
  openDapp: (arg) => openDapp(+arg), closeDapp,
  saveNode, saveApi, revealSeed, logout, doLogout,
  copyAddr: () => copyText(ADDR, 'address copied'),
  copySeed: () => copyText(SEED, 'seed copied'),
};
document.addEventListener('click', (e) => {
  const el = e.target.closest('[data-act]');
  if (!el) return;
  const fn = ACTIONS[el.dataset.act];
  if (fn) fn(el.dataset.arg);
});
$('backdrop').addEventListener('click', closeSheet);

if (SEED) showView('home'); else showWelcome();

/* Play the splash, then fade it out to reveal the wallet / welcome screen. */
setTimeout(() => { const s = $('splash'); if (!s) return; s.classList.add('hide'); setTimeout(() => s.remove(), 600); }, 1900);
</script>
